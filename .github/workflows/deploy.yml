name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and push Bot image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.bot
        push: true
        tags: |
          gamevibe/bot:latest
          gamevibe/bot:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64
        
    - name: Build and push Web Runtime image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.web
        push: true
        tags: |
          gamevibe/web:latest
          gamevibe/web:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64
        
    - name: Build and push Multiplayer Server image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: packages/multiplayer-server/Dockerfile
        push: true
        tags: |
          gamevibe/multiplayer:latest
          gamevibe/multiplayer:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64
        
    - name: Deploy to production
      if: ${{ github.event.inputs.environment != 'staging' }}
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        script: |
          cd /opt/gamevibe
          docker-compose pull
          docker-compose up -d --no-deps --build bot web multiplayer
          docker system prune -f
          
    - name: Deploy to staging
      if: ${{ github.event.inputs.environment == 'staging' }}
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        script: |
          cd /opt/gamevibe
          docker-compose -f docker-compose.staging.yml pull
          docker-compose -f docker-compose.staging.yml up -d --no-deps --build bot web multiplayer
          docker system prune -f
          
    - name: Run database migrations
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets[format('{0}_HOST', github.event.inputs.environment == 'staging' && 'STAGING' || 'PRODUCTION')] }}
        username: ${{ secrets[format('{0}_USER', github.event.inputs.environment == 'staging' && 'STAGING' || 'PRODUCTION')] }}
        key: ${{ secrets[format('{0}_SSH_KEY', github.event.inputs.environment == 'staging' && 'STAGING' || 'PRODUCTION')] }}
        script: |
          cd /opt/gamevibe
          docker-compose exec -T bot pnpm --filter @gamevibe/bot run db:migrate
          
    - name: Health check
      run: |
        sleep 30
        curl -f https://${{ secrets[format('{0}_URL', github.event.inputs.environment == 'staging' && 'STAGING' || 'PRODUCTION')] }}/health/ready || exit 1
        
    - name: Notify Discord
      if: always()
      uses: sarisia/actions-status-discord@v1
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        title: "Deployment to ${{ github.event.inputs.environment || 'production' }}"
        description: |
          **Status**: ${{ job.status }}
          **Branch**: ${{ github.ref_name }}
          **Commit**: ${{ github.sha }}
          **Actor**: ${{ github.actor }}
        color: ${{ job.status == 'success' && '3066993' || '15158332' }}

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
    - name: Rollback deployment
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets[format('{0}_HOST', github.event.inputs.environment == 'staging' && 'STAGING' || 'PRODUCTION')] }}
        username: ${{ secrets[format('{0}_USER', github.event.inputs.environment == 'staging' && 'STAGING' || 'PRODUCTION')] }}
        key: ${{ secrets[format('{0}_SSH_KEY', github.event.inputs.environment == 'staging' && 'STAGING' || 'PRODUCTION')] }}
        script: |
          cd /opt/gamevibe
          docker-compose down
          docker-compose up -d --no-deps bot web multiplayer
          
    - name: Notify Discord about rollback
      uses: sarisia/actions-status-discord@v1
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        title: "⚠️ Rollback Executed"
        description: |
          Deployment to ${{ github.event.inputs.environment || 'production' }} failed and was rolled back.
          **Branch**: ${{ github.ref_name }}
          **Commit**: ${{ github.sha }}
        color: 15158332