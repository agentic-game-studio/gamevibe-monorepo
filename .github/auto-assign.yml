# Configuration for auto-assigning reviewers and assignees

# Set to true to add reviewers to PRs
addReviewers: true

# Set to true to add assignees to PRs
addAssignees: author

# A list of reviewers to be added to PRs (GitHub user name)
reviewers:
  - reviewer1
  - reviewer2

# A number of reviewers added to the PR
numberOfReviewers: 1

# A list of assignees to be added to PRs (GitHub user name)
assignees:
  - assignee1
  - assignee2

# A number of assignees to add to the PR
numberOfAssignees: 0

# Add reviewers/assignees from different groups
groups:
  # Frontend changes
  frontend:
    - frontend-dev1
    - frontend-dev2
  # Backend changes  
  backend:
    - backend-dev1
    - backend-dev2
  # AI/ML changes
  ai:
    - ai-dev1
    - ai-dev2

# Skip adding reviewers/assignees if PR has these keywords
skipKeywords:
  - wip
  - draft

# Use CODEOWNERS file for assigning reviewers
useReviewGroups: true